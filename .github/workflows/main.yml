name: Auto Update SportsTV

on:
  schedule:
    - cron: '*/5 * * * *' # Chạy mỗi 5 phút
  workflow_dispatch: # Nút bấm thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Run bot
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json list.m3u
          # Thêm pull để tránh lỗi khi GitHub và Bot cập nhật cùng lúc
          git pull --rebase
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
