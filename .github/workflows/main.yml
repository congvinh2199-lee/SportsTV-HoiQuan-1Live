name: Auto Update SportsTV

on:
  schedule:
    - cron: '*/5 * * * *' # Chạy tự động mỗi 5 phút
  workflow_dispatch: # Nút bấm chạy thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Run bot
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.json list.m3u
          git pull --rebase
          git commit -m "Cập nhật trận đấu: $(date +'%H:%M %d/%m')" || exit 0
          git push
